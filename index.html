<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>天才工程師的殞落</title>
    <meta
      name="description"
      content="一個充滿 AI 合成感視覺風格的主題網站，展示殞落的天才工程師名單。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">SYNTHETIC LEGACY ARCHIVE</p>
        <h1>天才工程師的殞落</h1>
        <p class="hero-copy">
          這是一個很懶的生blog網站，不想讓網站顯示1033 Error所生出來的網站
        </p>
      </section>

      <section class="engineer-section">
        <div class="section-heading">
          <p class="eyebrow">FALLEN PRODIGIES</p>
          <h2>殞落名單</h2>
          <p>依照殞落程度分級，點開頭像可以查看更多戰損紀錄與現場證據。</p>
        </div>

        <div id="engineer-grid" class="engineer-grid"></div>
      </section>
    </main>

    <aside
      id="engineer-modal"
      class="engineer-modal"
      aria-hidden="true"
      aria-labelledby="engineer-modal-name"
    >
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-panel" role="dialog" aria-modal="true">
        <button
          type="button"
          class="modal-close"
          data-close-modal
          aria-label="關閉詳細資訊"
        >
          ×
        </button>
        <div id="engineer-modal-body"></div>
      </div>
    </aside>

    <script src="./script.js"></script>
  </body>
</html>
